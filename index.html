<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>테마 전환</title>
  <link href="./style.css" rel="stylesheet" />
  <script>
    (() => {
      const savedTheme = localStorage.getItem('theme');
      const systemTheme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.dataset.theme = savedTheme || systemTheme;
    })();
  </script>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Appearance</div>
    <h1>화면 테마를 선택하세요</h1>
    <p>밝은 화면과 어두운 화면을 자유롭게 전환할 수 있습니다.</p>
    <button class="theme-toggle" type="button" aria-label="다크 모드로 전환" aria-pressed="false">
      <span class="toggle-track" aria-hidden="true"><span class="toggle-thumb"><span class="sun">☀</span><span class="moon">☾</span></span></span>
      <span class="theme-label">화이트 모드</span>
    </button>
  </main>
  <script defer src="./main.js"></script>
</body>
</html>
